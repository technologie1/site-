<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pulse</title>
<link rel="stylesheet" href="css/style.css">
<!-- Ajout de marked.js pour parser le Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Pulse<span>.</span></a>
  </div>
</header>

<main class="main" id="homeScreen">
  <div id="homeContent"></div>
</main>

<div class="screen" id="articleScreen">
  <header class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-back" id="backBtn">↩ Retour</a>
    </div>
  </header>
  <div class="progress-bar" id="progressBar"></div>
  <div class="article-page" id="articlePage"></div>
</div>

<div class="toast" id="toastEl"><span id="toastTxt"></span></div>

<script>
// Configuration GitHub
const GITHUB_REPO = 'technologie1/site-';
const GITHUB_API_URL = `https://api.github.com/repos/${GITHUB_REPO}/contents/articles`;

// Fonction pour récupérer les articles depuis GitHub
async function fetchArticles() {
  try {
    const response = await fetch(GITHUB_API_URL);
    if (!response.ok) {
      throw new Error(`Erreur API GitHub: ${response.status}`);
    }
    const files = await response.json();
    
    // Filtrer les fichiers .md
    const articles = await Promise.all(
      files
        .filter(file => file.name.endsWith('.md') && file.type === 'file')
        .map(async file => {
          const articleResponse = await fetch(file.download_url);
          const content = await articleResponse.text();
          return parseMarkdownFile(content, file.name);
        })
    );
    
    // Trier par date (la plus récente en premier)
    articles.sort((a, b) => new Date(b.date) - new Date(a.date));
    return articles;
  } catch (error) {
    console.error('Erreur lors de la récupération des articles:', error);
    toast('Erreur lors du chargement des articles');
    return [];
  }
}

// Parser un fichier Markdown avec frontmatter
function parseMarkdownFile(content, filename) {
  // Extraire le frontmatter (métadonnées)
  const frontmatterMatch = content.match(/^---\n([\s\S]*?)\n---/);
  const frontmatter = frontmatterMatch ? frontmatterMatch[1] : '';
  const body = frontmatterMatch ? content.substring(frontmatterMatch[0].length) : content;
  
  // Parser le frontmatter en objet
  const metadata = {};
  if (frontmatter) {
    frontmatter.split('\n').forEach(line => {
      const match = line.match(/^(\w+):\s*"([^"]*)"|^(\w+):\s*([^\s"]+)/);
      if (match) {
        const key = match[1] || match[3];
        const value = match[2] || match[4];
        metadata[key] = value;
      }
    });
  }
  
  // Générer un slug à partir du nom de fichier (sans .md)
  const slug = filename.replace('.md', '');
  
  // Parser le corps en HTML avec marked.js
  const htmlBody = marked.parse(body);
  
  return {
    slug,
    title: metadata.title || 'Sans titre',
    date: metadata.date || new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }),
    category: metadata.category || 'Non classé',
    gradient: metadata.gradient || 'linear-gradient(135deg,#2563eb,#3b82f6)',
    excerpt: metadata.excerpt || htmlBody.substring(0, 120).replace(/<[^>]+>/g, ' ').trim(),
    body: htmlBody
  };
}

// Afficher la page d'accueil
function renderHome() {
  const container = document.getElementById('homeContent');
  container.innerHTML = `<section class="empty">
    <div class="empty-icon">📝</div>
    <h2 class="empty-title">Chargement des articles...</h2>
    <p class="empty-desc">Les articles sont chargés depuis GitHub.</p>
  </section>`;
  
  fetchArticles().then(arts => {
    if (!arts.length) {
      container.innerHTML = `<section class="empty">
        <div class="empty-icon">📝</div>
        <h2 class="empty-title">Aucun article pour l'instant</h2>
        <p class="empty-desc">Ajoutez des fichiers Markdown dans le dossier <code>/articles/</code> sur GitHub.</p>
      </section>`;
      return;
    }
    
    const sorted = [...arts].reverse();
    const first = sorted[0];
    let html = `<section class="hero" onclick="openArticle('${first.slug}')">
      <div class="hero-img" style="background:${first.gradient}"></div>
      <div class="hero-body">
        <div class="hero-cat">${esc(first.category)}</div>
        <h2 class="hero-title">${esc(first.title)}</h2>
        <p class="hero-desc">${esc(first.excerpt)}</p>
        <div class="hero-meta">${esc(first.date)}</div>
      </div>
    </section>
    <section class="section">
      <div class="section-head">
        <h3 class="section-title">Articles</h3>
        <span class="section-link">${sorted.length} article${sorted.length > 1 ? 's' : ''}</span>
      </div>`;
    
    if (sorted.length > 1) {
      html += `<div class="card-grid">`;
      for (let i = 1; i < sorted.length; i++) {
        const a = sorted[i];
        html += `<div class="card" onclick="openArticle('${a.slug}')">
          <div class="card-img" style="background:${a.gradient}"></div>
          <div class="card-body">
            <div class="card-cat">${esc(a.category)}</div>
            <div class="card-title">${esc(a.title)}</div>
            <div class="card-date">${esc(a.date)}</div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</section>`;
    container.innerHTML = html;
  });
}

// Ouvrir un article
function openArticle(slug) {
  fetchArticles().then(arts => {
    const a = arts.find(x => x.slug === slug);
    if (!a) { 
      toast('Article introuvable'); 
      return; 
    }
    const g = a.gradient || 'linear-gradient(135deg,#2563eb,#3b82f6)';
    let html = `<div class="article-img" style="background:${g}"></div>
      <div class="article-head">
        <div class="article-cat">${esc(a.category)}</div>
        <h1 class="article-title">${esc(a.title)}</h1>
        <div class="article-meta">${esc(a.date)}</div>
      </div>
      <div class="article-body">${a.body}</div>
      <div class="article-footer">
        <span>Publié <span class="slug">/a/${esc(slug)}</span></span>
        <button class="copy-btn" onclick="copyUrl('${esc(slug)}')">Copier le lien</button>
      </div>`;
    document.getElementById('articlePage').innerHTML = html;
    showScreen('articleScreen');
    document.getElementById('backBtn').href = '/';
    setTimeout(initCompTable, 50);
    document.title = a.title + ' — Pulse';
    window._currentSlug = slug;
    window.scrollTo(0, 0);
  });
}

// Gérer le routage (URLs comme /a/mon-article)
function routeFromURL() {
  const m = window.location.pathname.match(/^\/a\/([a-z0-9\-]+)/);
  if (m) { 
    openArticle(m[1]); 
    return true; 
  }
  return false;
}

// Gérer le retour en arrière
window.addEventListener('popstate', () => {
  const m = window.location.pathname.match(/^\/a\/([a-z0-9\-]+)/);
  if (m) { 
    openArticle(m[1]); 
    return; 
  }
  showScreen('homeScreen');
  renderHome();
  document.title = 'Pulse';
  document.getElementById('backBtn').href = '/';
});

// Barre de progression
window.addEventListener('scroll', () => {
  const bar = document.getElementById('progressBar');
  if (!bar || !document.getElementById('articleScreen').classList.contains('on')) return;
  const s = window.scrollY, t = document.documentElement.scrollHeight - window.innerHeight;
  bar.style.width = (t > 0 ? Math.min(s / t * 100, 100) : 0) + '%';
});

// Tableau comparatif (si présent dans l'article)
function initCompTable() {
  const t = document.getElementById('compTable');
  if (!t) return;
  let sc = -1, sa = true;
  t.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const idx = parseInt(th.dataset.col);
      sa = sc === idx ? !sa : true;
      sc = idx;
      const tb = t.querySelector('tbody');
      const rows = Array.from(tb.querySelectorAll('tr'));
      const num = rows.every(r => !isNaN(parseFloat(r.children[idx]?.textContent)));
      rows.sort((a, b) => {
        const va = (a.children[idx]?.textContent || '').trim(), vb = (b.children[idx]?.textContent || '').trim();
        return num ? (sa ? parseFloat(va) - parseFloat(vb) : parseFloat(vb) - parseFloat(va)) : sa ? va.localeCompare(vb) : vb.localeCompare(va);
      });
      rows.forEach(r => tb.appendChild(r));
      t.querySelectorAll('.sort-icon').forEach(s => s.textContent = '↕');
      th.querySelector('.sort-icon').textContent = sa ? '↑' : '↓';
    });
  });
  t.querySelectorAll('tbody tr').forEach(tr => tr.addEventListener('click', function() {
    t.querySelectorAll('tbody tr').forEach(r => r.classList.remove('active'));
    this.classList.add('active');
  }));
}

// Afficher un écran (home ou article)
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// Échapper le HTML pour éviter les injections
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Toast (notification)
let tt;
function toast(m) {
  document.getElementById('toastTxt').textContent = m;
  const el = document.getElementById('toastEl');
  el.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// Copier l'URL d'un article
function copyUrl(slug) {
  navigator.clipboard.writeText(window.location.origin + '/a/' + slug).then(() => toast('Lien copié'));
}

// Initialisation
if (!routeFromURL()) {
  renderHome();
  showScreen('homeScreen');
}
</script>
</body>
</html>
