<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pulse — Éditeur</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.editor-wrap{max-width:740px;margin:0 auto;padding:20px 24px 120px}
.editor-title{width:100%;padding:14px 0;font-size:28px;font-weight:700;border:none;outline:none;font-family:var(--font);color:var(--ink);margin-bottom:4px;background:transparent;letter-spacing:-.02em}
.editor-title::placeholder{color:var(--ink4)}
.editor-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.cat-tag{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:500;background:var(--surface);color:var(--ink3);border:1px solid var(--border2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.cat-tag:hover{border-color:var(--ink3);color:var(--ink2)}
.cat-tag.on{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.toolbar{display:flex;gap:2px;align-items:center;flex-wrap:wrap;padding:8px 0;margin-bottom:4px;border-bottom:1px solid var(--border)}
.tb-btn{height:32px;min-width:32px;border-radius:6px;border:none;background:transparent;color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 5px;font-size:12px;font-family:var(--font);font-weight:500;transition:all .1s}
.tb-btn:hover{background:var(--surface2)}
.tb-btn svg{width:15px;height:15px;stroke:currentColor;fill:none}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 6px;flex-shrink:0}
.editor-body{min-height:50vh;padding:16px 0;outline:none;font-family:var(--font-serif);font-size:17px;line-height:1.9;color:var(--ink2)}
.editor-body:empty:before{content:"Commencez à écrire...";color:var(--ink4);font-family:var(--font-serif)}
.editor-body h1{font-family:var(--font);font-size:28px;font-weight:700;color:var(--ink);margin:1.2em 0 0.4em;letter-spacing:-.02em}
.editor-body h2{font-family:var(--font);font-size:22px;font-weight:600;color:var(--ink);margin:1em 0 0.3em}
.editor-body h3{font-family:var(--font);font-size:18px;font-weight:600;color:var(--ink);margin:.8em 0 0.2em}
.editor-body p{margin-bottom:1.2em}
.editor-body img{max-width:100%;border-radius:var(--radius-sm);margin:1.5em 0}
.editor-body img.left{float:left;margin:0.5em 1em 0.5em 0;max-width:45%}
.editor-body img.right{float:right;margin:0.5em 0 0.5em 1em;max-width:45%}
.editor-body img.center{display:block;margin:1.5em auto;float:none}
.editor-body blockquote{border-left:3px solid var(--accent);padding:2px 0 2px 20px;margin:1.5em 0;color:var(--ink2);font-style:italic;font-size:18px}
.editor-body a{color:var(--accent);text-decoration:underline}
.editor-body ul,.editor-body ol{padding-left:1.4em;margin-bottom:1.2em}
.stats-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.editor-stats{display:flex;gap:16px;font-size:12px;color:var(--ink3)}
.editor-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:500;transition:all .12s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:.5;cursor:default}
.btn-outline{background:transparent;color:var(--ink2);border:1px solid var(--border2)}
.btn-outline:hover{border-color:var(--ink3);color:var(--ink)}
#imgInput{display:none}
/* AI */
.ai-fab{position:fixed;right:24px;bottom:100px;z-index:90;width:48px;height:48px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,0.3);display:flex;align-items:center;justify-content:center}
.ai-fab:active{transform:scale(0.92)}
.sheet{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.25);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s}
.sheet.open{opacity:1;pointer-events:all}
.sheet-inner{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-radius:20px 20px 0 0;padding:16px 24px 30px;transform:translateY(100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);max-height:80vh;overflow-y:auto}
.sheet.open .sheet-inner{transform:translateY(0)}
.sheet-h{width:36px;height:4px;background:var(--ink4);border-radius:99px;margin:0 auto 14px}
.sheet-title{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:2px}
.sheet-sub{font-size:12px;color:var(--ink3);margin-bottom:14px}
.ai-presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ai-preset{padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);font-size:12px;font-weight:500;cursor:pointer;color:var(--ink2);font-family:var(--font);text-align:center}
.ai-preset:active{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.ai-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);outline:none;font-size:14px;font-family:var(--font);resize:none;min-height:44px;color:var(--ink);background:var(--bg)}
.ai-input:focus{border-color:var(--accent)}
.ai-send{width:100%;margin-top:8px;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.ai-send:active{opacity:0.85}
.ai-response{padding:12px 14px;background:var(--surface);border-radius:var(--radius-sm);font-size:13px;color:var(--ink2);line-height:1.7;margin-top:10px;display:none;white-space:pre-wrap}
.ai-response.show{display:block}
.ai-response.loading{opacity:0.6}
.ai-settings{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.ai-settings-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ai-settings-row:last-child{margin-bottom:0}
.ai-settings-label{font-size:12px;font-weight:500;color:var(--ink2);min-width:80px}
.ai-settings select{flex:1;padding:6px 10px;border-radius:6px;border:1px solid var(--border2);font-size:12px;font-family:var(--font);color:var(--ink);background:var(--bg);outline:none}
.ai-settings select:focus{border-color:var(--accent)}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Pulse<span>.</span></a>
    <span style="font-size:13px;color:var(--ink3);font-weight:500">Éditeur</span>
    <div class="nav-actions">
      <a href="../index.html" class="nav-link">← Accueil</a>
    </div>
  </div>
</header>

<div class="editor-wrap">
  <input class="editor-title" id="titleField" placeholder="Titre de l'article..." value="Mon article">
  <div class="editor-cats">
    <span class="cat-tag on" onclick="this.classList.toggle('on')">IA</span>
    <span class="cat-tag" onclick="this.classList.toggle('on')">Startups</span>
    <span class="cat-tag" onclick="this.classList.toggle('on')">Hardware</span>
    <span class="cat-tag" onclick="this.classList.toggle('on')">Cyber</span>
    <span class="cat-tag" onclick="this.classList.toggle('on')">Recherche</span>
  </div>
  <div class="toolbar">
    <button class="tb-btn" onclick="exec('undo')"><svg viewBox="0 0 24 24"><path d="M3 10h13a4 4 0 010 8H7"/><polyline points="7 6 3 10 7 14"/></svg></button>
    <button class="tb-btn" onclick="exec('redo')"><svg viewBox="0 0 24 24"><path d="M21 10H8a4 4 0 000 8h9"/><polyline points="17 6 21 10 17 14"/></svg></button>
    <span class="tb-sep"></span>
    <button class="tb-btn" onclick="exec('bold')"><b style="font-weight:700">B</b></button>
    <button class="tb-btn" onclick="exec('italic')"><i>I</i></button>
    <button class="tb-btn" onclick="exec('underline')"><u>U</u></button>
    <span class="tb-sep"></span>
    <button class="tb-btn" onclick="exec('formatBlock','h1')">H1</button>
    <button class="tb-btn" onclick="exec('formatBlock','h2')">H2</button>
    <button class="tb-btn" onclick="exec('formatBlock','h3')">H3</button>
    <span class="tb-sep"></span>
    <button class="tb-btn" onclick="exec('insertUnorderedList')"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
    <button class="tb-btn" onclick="exec('insertOrderedList')"><svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg></button>
    <span class="tb-sep"></span>
    <button class="tb-btn" onclick="insertLink()"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
    <button class="tb-btn" onclick="document.getElementById('imgInput').click()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
    <button class="tb-btn" onclick="exec('formatBlock','blockquote')"><svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg></button>
    <span class="tb-sep"></span>
    <button class="tb-btn" onclick="alignImg('left')"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="12" height="10" rx="1" fill="none" stroke="currentColor"/><line x1="4" y1="4" x2="16" y2="4" stroke="currentColor"/></svg></button>
    <button class="tb-btn" onclick="alignImg('center')"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="10" rx="1" fill="none" stroke="currentColor"/><line x1="4" y1="4" x2="20" y2="4" stroke="currentColor"/></svg></button>
    <button class="tb-btn" onclick="alignImg('right')"><svg viewBox="0 0 24 24"><rect x="8" y="6" width="12" height="10" rx="1" fill="none" stroke="currentColor"/><line x1="8" y1="4" x2="20" y2="4" stroke="currentColor"/></svg></button>
  </div>

  <div class="editor-body" id="editable" contenteditable="true"></div>
  <input type="file" id="imgInput" accept="image/*">

  <div class="stats-row">
    <div class="editor-stats">
      <span id="statWords">0 mots</span>
      <span id="statChars">0 car.</span>
      <span id="statTime">~0 min</span>
    </div>
  </div>

  <div class="editor-actions">
    <a href="../index.html" class="btn btn-outline">Annuler</a>
    <button class="btn btn-primary" id="publishBtn" onclick="publish()">Publier</button>
  </div>
</div>

<button class="ai-fab" onclick="toggleAI()">IA</button>

<div class="sheet" id="aiSheet" onclick="if(event.target===this)toggleAI()">
  <div class="sheet-inner" onclick="event.stopPropagation()">
    <div class="sheet-h"></div>
    <div class="sheet-title">Assistant IA</div>
    <div class="sheet-sub">Sélectionnez un texte ou posez une question</div>
    <div class="ai-presets">
      <button class="ai-preset" onclick="aiPreset('resume')">Résumer</button>
      <button class="ai-preset" onclick="aiPreset('developper')">Développer</button>
      <button class="ai-preset" onclick="aiPreset('reformuler')">Reformuler</button>
      <button class="ai-preset" onclick="aiPreset('corriger')">Corriger</button>
      <button class="ai-preset" onclick="aiPreset('titre')">Suggérer un titre</button>
      <button class="ai-preset" onclick="aiPreset('structurer')">Structurer</button>
    </div>
    <textarea class="ai-input" id="aiQuestion" rows="2" placeholder="Ou posez votre question sur l'article..."></textarea>
    <button class="ai-send" onclick="askAI()">Envoyer</button>
    <div class="ai-response" id="aiResponse"></div>
    <div class="ai-settings">
      <div class="ai-settings-row">
        <span class="ai-settings-label">Modèle</span>
        <select id="aiModel">
          <option value="mistral-small-latest">Mistral Small</option>
          <option value="mistral-medium-latest" selected>Mistral Medium</option>
          <option value="mistral-large-latest">Mistral Large</option>
        </select>
      </div>
      <div class="ai-settings-row">
        <span class="ai-settings-label">Réflexion</span>
        <select id="aiReflexion">
          <option value="0.8">Rapide</option>
          <option value="0.5" selected>Normal</option>
          <option value="0.2">Approfondi</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"><span id="toastTxt"></span></div>

<script>
const MISTRAL_KEY = 'Vs7bS02ZzmhbkObcsEAb6I9KmsMYOT93';
const ARTICLES_KEY = 'pulse-articles';
const editable = document.getElementById('editable');
const aiQ = document.getElementById('aiQuestion');
const aiR = document.getElementById('aiResponse');

function exec(cmd,val) {
  if(cmd==='formatBlock'&&val) document.execCommand(cmd,false,val);
  else document.execCommand(cmd,false,val||null);
  editable.focus(); updateStats();
}

function updateStats() {
  const t=(editable.innerText||'').replace(/&nbsp;/g,' ').trim();
  const w=t?t.split(/\s+/).filter(Boolean).length:0;
  document.getElementById('statWords').textContent=w+' mots';
  document.getElementById('statChars').textContent=t.length+' car.';
  document.getElementById('statTime').textContent='~'+Math.max(1,Math.round(w/200))+' min';
}
new MutationObserver(updateStats).observe(editable,{childList:true,subtree:true,characterData:true});
editable.addEventListener('input',updateStats);

document.getElementById('imgInput').addEventListener('change',function(){
  if(!this.files||!this.files[0]) return;
  const r=new FileReader();
  r.onload=e=>exec('insertImage',e.target.result);
  r.readAsDataURL(this.files[0]); this.value='';
});

function insertLink(){
  const s=window.getSelection().toString().trim();
  const u=prompt('URL :'); if(!u) return;
  if(s) exec('createLink',u);
  else {const t=prompt('Texte :')||u;document.execCommand('insertHTML',false,'<a href="'+u+'">'+t+'</a>');}
}

function alignImg(p){
  const s=window.getSelection();if(!s.rangeCount)return;
  let i=s.anchorNode;if(i.nodeType===3)i=i.parentElement;
  i=i.closest?i.closest('img'):null;if(!i)return;
  ['left','center','right'].forEach(c=>{if(c!==p)i.classList.remove(c)});i.classList.add(p);
  if(p==='center'){i.style.float='none';i.style.display='block';i.style.margin='1.5em auto'}
  else if(p==='left'){i.style.float='left';i.style.display='';i.style.margin='0.5em 1em 0.5em 0'}
  else{i.style.float='right';i.style.display='';i.style.margin='0.5em 0 0.5em 1em'}
}

function genSlug(){const c='abcdefghijklmnopqrstuvwxyz0123456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('')}

function publish(){
  const title=document.getElementById('titleField').value.trim()||'Sans titre';
  const body=editable.innerHTML;
  if(!body||body==='<br>'){toast('Contenu vide');return;}
  const cats=Array.from(document.querySelectorAll('.cat-tag.on')).map(el=>el.textContent).join(', ')||'Non classé';
  const slug=genSlug();
  const article={
    slug,title,body,cat:cats,
    date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}),
    gradient:'linear-gradient(135deg,#2563eb,#3b82f6)',
    excerpt:body.replace(/<[^>]+>/g,' ').trim().substring(0,120)
  };
  const arts=JSON.parse(localStorage.getItem(ARTICLES_KEY)||'[]');
  arts.push(article);
  localStorage.setItem(ARTICLES_KEY,JSON.stringify(arts));
  const btn=document.getElementById('publishBtn');
  btn.textContent='✓ Publié';btn.disabled=true;
  toast('Article publié !');
  setTimeout(()=>window.location.href='../a/'+slug,1200);
}

function toggleAI(){document.getElementById('aiSheet').classList.toggle('open')}

function aiPreset(type){
  const sel=window.getSelection().toString().trim();
  const doc=editable.innerText.substring(0,4000);
  const ctx=sel||doc.substring(0,800);
  const prompts={
    resume:'Résume le texte suivant en 3-4 phrases claires et concises :\n\n'+ctx,
    developper:'Développe et approfondis le texte suivant avec des arguments supplémentaires :\n\n'+ctx,
    reformuler:'Reformule le texte suivant de façon professionnelle et élégante :\n\n'+ctx,
    corriger:'Corrige les fautes et améliore le style du texte suivant :\n\n'+ctx,
    titre:'Propose 5 titres accrocheurs pour un article de tech :\n\n'+ctx,
    structurer:'Structure le texte suivant en sections avec sous-titres :\n\n'+ctx
  };
  aiQ.value=prompts[type]||'';
}

async function askAI(){
  const q=aiQ.value.trim();if(!q)return;
  aiR.textContent='Analyse en cours...';aiR.className='ai-response show loading';
  const model=document.getElementById('aiModel').value;
  const temp=parseFloat(document.getElementById('aiReflexion').value);
  try{
    const r=await fetch('https://api.mistral.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+MISTRAL_KEY},
      body:JSON.stringify({
        model,
        messages:[
          {role:'system',content:'Tu es un assistant journalistique expert. Réponds en français, de façon claire et professionnelle.'},
          {role:'user',content:q}
        ],
        temperature:temp,
        max_tokens:2048
      })
    });
    if(!r.ok){
      let msg='Erreur API';
      if(r.status===401)msg='Clé API invalide';
      else if(r.status===429)msg='Trop de requêtes';
      else try{const j=await r.json();msg=j.error?.message||msg}catch(e){}
      aiR.textContent='❌ '+msg;aiR.className='ai-response show';return;
    }
    const data=await r.json();
    aiR.textContent=data.choices[0].message.content.trim();
    aiR.className='ai-response show';
  }catch(e){aiR.textContent='❌ Erreur: '+e.message;aiR.className='ai-response show'}
}

let tt;
function toast(m){
  document.getElementById('toastTxt').textContent=m;
  const el=document.getElementById('toastEl');el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2600);
}
</script>
</body>
</html>
